<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        list-style-type: square; /* Change bullet points to squares */
        color: blue; /* Text color of list items */
      }
      /* Styling for ordered list (<ol>) */
      ol {
        color: blueviolet; /* Numbering style for ordered list */
        font-weight: bold; /* Bold font for list items in ordered list */
      }
      li {
        margin: 8px 0; /* Spacing between list items */
      }
    </style>
  </head>
  <body>
    <h2>Unordered List Example</h2>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
    <h2>Ordered List Example</h2>
    <ol type="I">
      <li>First item</li>
      <li>Second item</li>
      <li>Third item</li>
    </ol>
  </body>
</html>
