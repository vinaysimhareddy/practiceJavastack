<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            left: 50%;
            top: 45%;
            position: absolute;
            transform: translate(-50%, -50%);
            border: 2px solid black;
            padding: 2rem;
            border-radius: 5px;

        }



        input {
            margin-bottom: 1rem;
            margin-top: 0.2rem;
            padding: 0.4rem 0.7rem 0.4rem 0.7rem;
            border: 1px solid black;
            border-radius: 2px;
        }

        .button {
            /* background-image: linear-gradient(to right, #fc00ff 0%, #79f08f 51%, #4ebfef 100%); */
            background-color: aqua;
            border: 1px solid black;
            border-radius: 2px;
            padding: 0.3rem 1rem 0.3rem 1rem;

            transition: background-position 0.5s ease transform 0.3s ease;
            background-size: 200% auto;
            background-position: left center;

        }

        /* .button:hover {
            background-position: right center;
            text-decoration: none;
            transform: scale(1.1);

        } */
    </style>
</head>

<body>
    <form>
        <h1>Login Form</h1>
        <label for="emailId">Email</label><br />
        <input id="emailId" onkeypress="handelKeyPress(event)" type="email" placeholder="Enter email"><br />
        <label for="passwordId">Password</label><br />
        <input id="passwordId" type="password" placeholder="Enter password"><br />
        <button class="button" onmouseout="handelMouseout(event)" onmouseover="handelMouseover(event)"
            onclick="handlelogin()" value="Login">Login</button>
    </form>
</body>
<script>
    function handlefocus(event) {
        console.log("you are focusing");
    }
    function handlelogin() {
        console.log("you are trying to login");
        var EmailId = document.getElementById("emailId").value;
        var Password = document.getElementById("passwordId").value;

        var user = {
            email: EmailId,
            password: Password
        }
        if (EmailId == "") {
            alert("Email should not be empty");
            return;
        }
        if (Password.length <= 8 || Password == "") {
            alert("atleast password should contain more than 8 letters");
            return;
        }

        console.log(user);
    }
    function handelKeyPress(event) {
        let keyCode = event.keyCode || event.which;
        if (!(keyCode >= 48 && keyCode <= 57)) {
            alert("only numbers are allowed ");
            event.preventDefault();
        }
    }
    function handelMouseover(event) {
        var element = event.target;
        element.style.backgroundColor = "red";
        element.style.color = "white";
        element.style.cursor = "pointer";

    }
    function handelMouseout(event) {
        var element = event.target;
        element.style.backgroundColor = "aqua";
        element.style.color = "black";
    }
    window.onresize = function (event) {
        console.log("Window resize");
        console.log(window.innerHeight);
        console.log(window.innerWidth);
    }
</script>

</html>
