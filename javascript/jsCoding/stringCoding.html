    let input = "Iphone 16 pro";
    let result = [];
    let inputSplit = input.toLowerCase().split(" ");//[input,16,pro]

    for (let i = 0; i < inputSplit.length; i++) { //item.name.toLowerCase().includes(inputSplit[i]);
        let results = iphones.filter((item => {

        }));
        for (let i = 0; i < results.length; i++) {
            let isPresent = result.find(item => {
                return item.iphoneId == results[i].iphoneId
            });
            if (!(isPresent)) {
                result.push(results[i]);
            }
        }
    }
    console.log(result);
